<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" type="image/jpeg" href="{{ '/assets/images/cropped-stellar_rose.jpg' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="text/calendar" title="{{ site.title }} — all shows" href="{{ '/calendar.ics' | absolute_url }}">
  {% feed_meta %}
  {% seo %}
</head>
<body>
  {% include header.html %}
  <main>
    {{ content }}
  </main>
  {% include footer.html %}
  <div id="image-lightbox" class="image-lightbox" hidden aria-hidden="true">
    <button type="button" class="image-lightbox-close" aria-label="Close">&times;</button>
    <img class="image-lightbox-img" src="" alt="">
  </div>
  <script>
    document.querySelector('.nav-toggle').addEventListener('click', function() {
      document.querySelector('.nav-links').classList.toggle('open');
      this.classList.toggle('active');
    });

    (function() {
      var lightbox = document.getElementById('image-lightbox');
      var lightboxImg = lightbox && lightbox.querySelector('.image-lightbox-img');
      var closeBtn = lightbox && lightbox.querySelector('.image-lightbox-close');
      if (!lightbox || !lightboxImg) return;

      function openLightbox(img) {
        lightboxImg.src = img.currentSrc || img.src;
        lightboxImg.alt = img.alt || '';
        lightbox.hidden = false;
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.classList.add('lightbox-open');
        closeBtn.focus();
      }

      function closeLightbox() {
        lightbox.hidden = true;
        lightbox.setAttribute('aria-hidden', 'true');
        lightboxImg.removeAttribute('src');
        document.body.classList.remove('lightbox-open');
      }

      document.querySelectorAll('.event-description img').forEach(function(img) {
        img.setAttribute('role', 'button');
        img.setAttribute('tabindex', '0');
        img.addEventListener('click', function() { openLightbox(img); });
        img.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openLightbox(img);
          }
        });
      });

      lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) closeLightbox();
      });
      closeBtn.addEventListener('click', closeLightbox);
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && !lightbox.hidden) closeLightbox();
      });
    })();
  </script>
</body>
</html>
